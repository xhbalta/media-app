<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Balta Media</title>
    <!-- Etiquetas SEO -->
    <link rel="canonical" href="https://balta-media.odoo.com/" id="canonicalLink">
    <link rel="alternate" media="only screen and (max-width: 640px)" href="https://app.baltaanay.org/" id="alternateLink">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://balta-media.odoo.com/web/image/885-f3d79ca9/xhbalta-aula.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://balta-media.odoo.com/web/image/885-f3d79ca9/xhbalta-aula.png">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/styles.css">

    <!-- ESTILOS BASE -->
    <style id="sidebar-base-styles">
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050505;
        }
        body {
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-areas:
                "sidebar main-area";
            grid-template-rows: 1fr;
        }
        /* SIDEBAR */
        .sidebar-desktop {
            grid-area: sidebar;
            background: #0F0F0F;
            color: #fff;
            z-index: 900;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            scrollbar-width: none;
            transition: width 0.3s ease;
            width: 70px;
            min-width: 70px;
        }
        .sidebar-desktop::-webkit-scrollbar { display: none; }
        .sidebar-desktop.expanded {
            width: 220px;
            min-width: 220px;
        }
        @media (min-width: 1280px) {
            .sidebar-desktop.expanded {
                width: 250px;
                min-width: 250px;
            }
        }
        @media (max-width: 768px) {
            .sidebar-desktop { display: none !important; }
        }
        .sidebar-toggle {
            display: flex;
            justify-content: flex-end;
            padding: 16px 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar-toggle svg { width: 24px; height: 24px; fill: white; transition: transform 0.2s; }
        .sidebar-desktop.expanded .sidebar-toggle svg { transform: rotate(180deg); }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 8px;
            margin-bottom: 30px;
        }
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .sidebar-nav-item:hover { background: rgba(255,255,255,0.1); }
        .sidebar-nav-item.active { background: rgba(255,255,255,0.2); }
        .sidebar-nav-item img { width: 24px; height: 24px; filter: brightness(1.2); flex-shrink: 0; }
        .sidebar-nav-item span { font-size: 14px; font-weight: 500; }
        .sidebar-desktop:not(.expanded) .sidebar-nav-item span { display: none; }
        .sidebar-desktop:not(.expanded) .sidebar-rec-section { display: none; }
        .sidebar-rec-section {
            padding: 0 8px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 16px;
        }
        .sidebar-rec-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .sidebar-rec-header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sidebar-rec-header svg { width: 16px; height: 16px; fill: white; }
        .sidebar-rec-list { display: flex; flex-direction: column; gap: 12px; }
        .sidebar-rec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
            padding: 6px;
            border-radius: 6px;
        }
        .sidebar-rec-item:hover { background: rgba(255,255,255,0.08); }
        .sidebar-rec-item img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .sidebar-rec-item-info { flex: 1; min-width: 0; }
        .sidebar-rec-item-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-rec-item-author { font-size: 11px; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-rec-play-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .sidebar-rec-play-btn:hover { background: rgba(255,255,255,0.2); }
        .sidebar-rec-play-btn svg { width: 18px; height: 18px; fill: white; }
        /* MAIN AREA */
        .main-area {
            grid-area: main-area;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .header-container {
            position: sticky;
            top: 0;
            z-index: 60;
            width: 100%;
            transition: transform 0.32s cubic-bezier(0.25, 0.1, 0.25, 1);
            background: rgba(5,5,5,0.96);
            backdrop-filter: blur(12px);
        }
        .header-container.hidden {
            transform: translateY(-100%);
        }
        #main-header {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        #main-header > div {
            padding: 0.75rem 1rem;
        }
        #category-filters {
            background: rgba(5,5,5,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        #category-filters > div {
            padding: 0.5rem 1rem;
        }
        #content {
            flex: 1 1 auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1.25rem 1rem;
            padding-bottom: 140px;   /* Espacio para footer/derechos de autor */
        }
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-areas: "main-area";
            }
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-[Plus_Jakarta_Sans]">

        </div>

<!-- Script sidebar -->
<script type="module">
import { episodios, getSerieById } from '/episodios.js';
(function() {
    const SIDEBAR_CONFIG = { BREAKPOINT: 768 };
    let sidebarInstance = {
        initialized: false,
        currentState: localStorage.getItem('sidebar_state') || 'collapsed',
        isMobile: window.innerWidth <= SIDEBAR_CONFIG.BREAKPOINT
    };
    function getRandomEpisodes(count = 12) {
        const shuffled = [...episodios].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
    }
    function renderSidebar() {
        const sidebar = document.createElement('aside');
        sidebar.className = `sidebar-desktop ${sidebarInstance.currentState}`;
        sidebar.id = 'sidebarDesktop';
        const toggle = document.createElement('div');
        toggle.className = 'sidebar-toggle';
        toggle.id = 'sidebarDesktopToggle';
        toggle.innerHTML = '<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';
        const nav = document.createElement('div');
        nav.className = 'sidebar-nav';
        nav.innerHTML = `
            <a href="/" class="sidebar-nav-item" title="Inicio" data-link>
                <img src="https://balta-media.odoo.com/web/image/798-1b947c8d/Home%20%282%29.webp" alt="Inicio" loading="lazy"><span>Inicio</span>
            </a>
            <a href="/buscar" class="sidebar-nav-item" title="Buscar" data-link>
                <img src="https://balta-media.odoo.com/web/image/800-91a2fecc/Search%20%282%29.webp" alt="Buscar" loading="lazy"><span>Buscar</span>
            </a>
            <a href="/explorar" class="sidebar-nav-item" title="Explorar" data-link>
                <img src="https://balta-media.odoo.com/web/image/796-aee658de/Explore.png" alt="Explorar" loading="lazy"><span>Explorar</span>
            </a>
            <a href="https://www.baltaanay.org/solicitud" class="sidebar-nav-item" title="Crear">
                <img src="https://balta-media.odoo.com/web/image/885-f3d79ca9/xhbalta-aula.png" alt="Crear" loading="lazy"><span>Crear</span>
            </a>
            <a href="/biblioteca" class="sidebar-nav-item" title="Biblioteca" data-link>
                <img src="https://nikichitonjesus3.odoo.com/web/image/453-f4d8c1eb/user.png" alt="Biblioteca" loading="lazy"><span>Biblioteca</span>
            </a>
        `;
        const recSection = document.createElement('div');
        recSection.className = 'sidebar-rec-section';
        recSection.innerHTML = `
            <div class="sidebar-rec-header">
                <a href="/novedades" data-link>Recomendados<svg viewBox="0 0 24 24"><path d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg></a>
            </div>
            <div class="sidebar-rec-list" id="sidebarRecList"></div>
        `;
        sidebar.appendChild(toggle);
        sidebar.appendChild(nav);
        sidebar.appendChild(recSection);
        return sidebar;
    }
    function populateRecommendations() {
        const container = document.getElementById('sidebarRecList');
        if (!container) return;
        container.innerHTML = '';
        const selected = getRandomEpisodes(12);
        if (!selected.length) {
            container.innerHTML = '<div style="color:#aaa; padding:8px;">No hay episodios disponibles</div>';
            return;
        }
        selected.forEach(ep => {
            const serie = getSerieById(ep.seriesid) || {};
            const item = document.createElement('div');
            item.className = 'sidebar-rec-item';
            item.innerHTML = `
                <img src="${serie.portada_serie || ep.coverUrl || 'https://via.placeholder.com/40'}" alt="${ep.title}" loading="lazy">
                <div class="sidebar-rec-item-info">
                    <div class="sidebar-rec-item-title">${ep.title}</div>
                    <div class="sidebar-rec-item-author">${ep.author || serie.titulo_serie || '—'}</div>
                </div>
                <button class="sidebar-rec-play-btn" data-url="${ep.detailUrl || '#'}">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
            `;
            const btn = item.querySelector('button');
            btn.addEventListener('click', e => {
                e.preventDefault();
                e.stopPropagation();
                const url = btn.dataset.url;
                if (url && url !== '#' && window.router) {
                    window.history.pushState(null, null, url);
                    window.router();
                }
            });
            item.addEventListener('click', e => {
                if (e.target.tagName !== 'BUTTON') {
                    e.preventDefault();
                    const url = ep.detailUrl;
                    if (url && url !== '#' && window.router) {
                        window.history.pushState(null, null, url);
                        window.router();
                    }
                }
            });
            container.appendChild(item);
        });
    }
    function setActiveNavItem() {
        const currentPath = window.location.pathname;
        document.querySelectorAll('.sidebar-nav-item').forEach(item => {
            const href = item.getAttribute('href');
            item.classList.toggle('active',
                (href === currentPath) ||
                (href === '/' && currentPath === '/') ||
                (href === '/buscar' && currentPath === '/buscar')
            );
        });
    }
    function initSidebarToggle() {
        const sidebar = document.getElementById('sidebarDesktop');
        const toggle = document.getElementById('sidebarDesktopToggle');
        if (!sidebar || !toggle) return;
        const newToggle = toggle.cloneNode(true);
        toggle.parentNode.replaceChild(newToggle, toggle);
        newToggle.addEventListener('click', e => {
            e.stopPropagation();
            e.preventDefault();
            const isCollapsed = sidebar.classList.contains('collapsed');
            if (isCollapsed) {
                sidebar.classList.remove('collapsed');
                sidebar.classList.add('expanded');
            } else {
                sidebar.classList.add('collapsed');
                sidebar.classList.remove('expanded');
            }
            localStorage.setItem('sidebar_state', isCollapsed ? 'expanded' : 'collapsed');
        });
    }
    function initSidebar() {
        sidebarInstance.isMobile = window.innerWidth <= SIDEBAR_CONFIG.BREAKPOINT;
        const oldSidebar = document.querySelector('.sidebar-desktop');
        if (oldSidebar) oldSidebar.remove();
        if (sidebarInstance.isMobile) return;
        const sidebar = renderSidebar();
        document.body.insertBefore(sidebar, document.body.firstChild);
        populateRecommendations();
        initSidebarToggle();
        setActiveNavItem();
        sidebarInstance.initialized = true;
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSidebar);
    } else {
        initSidebar();
    }
    window.addEventListener('resize', () => {
        const wasMobile = sidebarInstance.isMobile;
        const isMobileNow = window.innerWidth <= SIDEBAR_CONFIG.BREAKPOINT;
        if (wasMobile !== isMobileNow) {
            sidebarInstance.isMobile = isMobileNow;
            initSidebar();
        }
    });
    document.addEventListener('spa-navigation', setActiveNavItem);
    window.addEventListener('popstate', setActiveNavItem);
    window.sidebarAPI = {
        refresh: populateRecommendations,
        setActive: setActiveNavItem,
        toggle: () => {
            const sidebar = document.getElementById('sidebarDesktop');
            if (sidebar) {
                const isCollapsed = sidebar.classList.contains('collapsed');
                if (isCollapsed) {
                    sidebar.classList.remove('collapsed');
                    sidebar.classList.add('expanded');
                } else {
                    sidebar.classList.add('collapsed');
                    sidebar.classList.remove('expanded');
                }
                localStorage.setItem('sidebar_state', isCollapsed ? 'expanded' : 'collapsed');
            }
        }
    };
})();
</script>

<!-- HEADER HIDE ON SCROLL (versión definitiva - solo escucha #content) -->
<script>
    let lastScrollTop = 0;
    const headerContainer = document.getElementById('headerContainer');

    function handleHeaderScroll() {
        const st = document.getElementById('content').scrollTop;

        if (Math.abs(st - lastScrollTop) < 15) return;

        if (st > lastScrollTop && st > 80) {
            headerContainer.classList.add('hidden');
        } else {
            headerContainer.classList.remove('hidden');
        }

        lastScrollTop = st;
    }

    document.getElementById('content').addEventListener('scroll', handleHeaderScroll, { passive: true });
</script>

<!-- Cargar el router principal -->
<script type="module" src="/main.js"></script>
</body>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reproductor Universal</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111 !important; color: white !important; }
.player-universal { display: none; position: fixed; bottom: 0; width: 100%; z-index: 1001; }
.player-expanded {
  background: #333 !important;
  height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
  position: fixed;
  top: env(safe-area-inset-top);
  left: 0;
  right: 0;
  overflow-y: auto;
  z-index: 1001;
}
.content-wrapper {
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 300px;
  flex-grow: 1;
}
.complex2, .complex3 { width: 100%; }
.player-minimized {
  background: #222;
  height: 60px;
  display: flex;
  align-items: center;
  padding: 10px;
  justify-content: space-between;
  box-sizing: border-box;
  position: relative;
  cursor: pointer;
}
.player-hidden { display: none; }
.top-controls {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 300px;
  margin-bottom: 10px;
}
/* Estilo base del toggle */
.media-mode-toggle {
  background: #444;
  border: none;
  border-radius: 20px;
  padding: 8px 12px;
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  white-space: nowrap;
  transition: all 0.3s ease;
  opacity: 1;
}

/* Estado desactivado: solo audio, no hay video disponible */
.media-mode-toggle.disabled {
  opacity: 0.5;
  background: #333;
  cursor: not-allowed;
  pointer-events: none; /* Impide clics */
}

/* Resaltar el modo activo cuando hay video */
.media-mode-toggle.audio.active-left {
  background: linear-gradient(to right, #ff0000 50%, #444 50%);
}
.media-mode-toggle.video.active-right {
  background: linear-gradient(to right, #444 50%, #ff0000 50%);
}

/* Texto dentro del botón */
.mode-left, .mode-right {
  padding: 0 8px;
  transition: color 0.3s ease;
}

/* Cuando está desactivado, texto de video tenue */
.media-mode-toggle.disabled .mode-right {
  color: #888;
}

/* Cuando está activo (solo aplica si no disabled) */
.media-mode-toggle:not(.disabled) .mode-left.active,
.media-mode-toggle:not(.disabled) .mode-right.active {
  font-weight: bold;
  color: white;
}
.minimize-btn {
  background: rgba(0, 0, 0, 0.5);
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1003;
}
.minimize-btn img { width: 24px; height: 24px; }
.player-hidden { display: none; }
.media-container {
  width: 100%;
  background: #000;
  position: relative;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  aspect-ratio: 16 / 9;
  -webkit-tap-highlight-color: transparent;
}
.media-container video, .media-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  z-index: 1000;
  border-radius: 10px;
}
.media-container .overlay-gradient {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.3) 100%);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 1001;
}
.media-container.show-controls .overlay-gradient { opacity: 1; }
.media-controls-center { display: flex; justify-content: center; align-items: center; flex-grow: 1; }
.media-controls-bottom { display: flex; justify-content: flex-end; padding: 10px; }
.fullscreen-controls {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
  justify-content: space-between;
  z-index: 1002;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.5) 100%);
}
.fullscreen-title { color: white; font-size: 18px; font-weight: bold; text-align: center; padding: 10px; background: transparent; }
.fullscreen-center-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
.fullscreen-bottom-bar { display: flex; align-items: center; padding: 10px; background: transparent; }
.video-progress-container-fullscreen { flex-grow: 1; height: 6px; background: #555; border-radius: 3px; position: relative; cursor: pointer; }

const throttle = (func, limit) => {
  let lastCall = null;
  return (...args) => {
    const now = Date.now();
    if (!lastCall || now - lastCall > limit) {
      lastCall = now;
      return func(...args);
    }
  };
};
const throttledSaveState = throttle(saveState, 500);

const cleanEvents = () => {
  mediaElement.removeEventListener('timeupdate', updateProgress);
  mediaElement.removeEventListener('loadedmetadata', updateProgress);
  mediaElement.removeEventListener('volumechange', checkMute);
  mediaElement.removeEventListener('ended', handleMediaEnd);
  const newMediaElement = mediaElement.cloneNode(true);
  mediaElement.parentNode.replaceChild(newMediaElement, mediaElement);
  mediaElement = newMediaElement;
  mediaElement.addEventListener('timeupdate', updateProgress);
  mediaElement.addEventListener('loadedmetadata', updateProgress);
  mediaElement.addEventListener('volumechange', checkMute);
  mediaElement.addEventListener('ended', handleMediaEnd);
};

      state.coverUrlInfo,

      state.detailUrl,
      state.author || 'Roberto',
      state.next || [],

      state.allowDownload || true
    );

      mediaElement.currentTime = state.currentTime || 0;
      mediaElement.playbackRate = state.playbackRate || 1;

const updateModeToggleState = () => {
  const toggle = document.getElementById('mediaModeToggle');
  if (!toggle) return;
  const left = toggle.querySelector('.mode-left');
  const right = toggle.querySelector('.mode-right');
  toggle.classList.remove('disabled', 'audio', 'video', 'active-left', 'active-right');
  left.classList.remove('active');
  right.classList.remove('active');
  if (!currentMedia || currentMedia.mediaType !== 'video') {
    toggle.classList.add('disabled');
    toggle.classList.add('audio');
    left.classList.add('active');
  } else {
    toggle.classList.remove('disabled');
    if (isAudioMode) {
      toggle.classList.add('audio', 'active-left');
      left.classList.add('active');
    } else {
      toggle.classList.add('video', 'active-right');
      right.classList.add('active');
    }
  }
};

const setupPlaylistDrag = () => {
  const items = playlistItems.querySelectorAll('.playlist-item');
  items.forEach(item => {
    item.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', item.dataset.index);
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', (e) => {
      item.classList.remove('dragging');
    });
    item.addEventListener('dragover', (e) => {
      e.preventDefault();
      const dragging = playlistItems.querySelector('.dragging');
      if (dragging !== item) {
        const from = parseInt(dragging.dataset.index);
        const to = parseInt(item.dataset.index);
        if (from < to) {
          item.after(dragging);
        } else {
          item.before(dragging);
        }
        const newItems = playlistItems.querySelectorAll('.playlist-item');
        newItems.forEach((it, idx) => it.dataset.index = idx);
        const temp = playlist[from];
        playlist.splice(from, 1);
        playlist.splice(to, 0, temp);
        localStorage.setItem('playlist', JSON.stringify(playlist));
        currentIndex = playlist.findIndex(p => p.mediaUrl === currentMedia.mediaUrl);
      }
    });
    item.addEventListener('drop', (e) => {
      e.preventDefault();
    });
    item.addEventListener('touchstart', (e) => {
      if (e.target.closest('.drag-handle')) {
        item.classList.add('dragging');
      }
    });
    item.addEventListener('touchmove', (e) => {
      if (item.classList.contains('dragging')) {
        e.preventDefault();
      }
    });
    item.addEventListener('touchend', (e) => {
      item.classList.remove('dragging');
    });
  });
};

const handleMediaTap = (e) => {
  if (e.target.closest('button')) return;
  e.preventDefault();
  e.stopPropagation();
  const now = Date.now();
  if (now - lastTapTime < 250) {
    tapCount++;
  } else {
    tapCount = 1;
  }
  lastTapTime = now;
  const rect = mediaContainer.getBoundingClientRect();
  let x;
  if (e.changedTouches) {
    x = e.changedTouches[0].clientX - rect.left;
  } else {
    x = e.clientX - rect.left;
  }
  tapSide = x < rect.width / 2 ? 'left' : 'right';
  if (tapTimeout) clearTimeout(tapTimeout);
  tapTimeout = setTimeout(() => {
    if (tapCount === 1) {
      showControls = !showControls;
      mediaContainer.classList.toggle('show-controls', showControls);
      if (showControls) {
        muteIndicator.style.display = 'none';
      } else if (isAutoMuted && !isUserMuted) {
        showMuteIndicator();
      }
    } else if (tapCount > 1) {
      const seconds = 15 * (tapCount - 1);
      if (tapSide === 'left') {
        rewind(seconds);
      } else {
        forward(seconds);
      }
    }
    tapCount = 0;
  }, 250);
};

const formatTime = (seconds) => {
  if (isNaN(seconds)) return "00:00";
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
};
const updateProgressDrag = (clientX, container, progressBar) => {
  const rect = container.getBoundingClientRect();
  const x = clientX - rect.left;
  const width = rect.width;
  let percentage = (x / width) * 100;
  percentage = Math.max(0, Math.min(100, percentage));

const setupTimer = () => {
  if (timerId) clearTimeout(timerId);
  if (timerCountdownInterval) clearInterval(timerCountdownInterval);
  if (timerValue === 'end') {
    currentEpisodeId = currentMedia.mediaUrl;
    const updateEndTimer = () => {
      const remaining = mediaElement.duration - mediaElement.currentTime;
      if (remaining <= 0 && currentEpisodeId === currentMedia.mediaUrl) {
        mediaElement.pause();
        resetTimer();
      }
    };
    mediaElement.addEventListener('timeupdate', updateEndTimer);
    timerCountdownInterval = setInterval(() => {
      countdownDisplay.textContent = formatTime(mediaElement.duration - mediaElement.currentTime);
    }, 1000);
  } else if (timerValue !== '0') {
    const minutes = parseInt(timerValue);
    let remaining = minutes * 60;
    timerId = setTimeout(() => {
      mediaElement.pause();
      resetTimer();
    }, remaining * 1000);
    timerCountdownInterval = setInterval(() => {
      remaining--;
      countdownDisplay.textContent = formatTime(remaining);
      if (remaining <= 0) clearInterval(timerCountdownInterval);
    }, 1000);
  }
  updateTimerButtons(timerValue);
  if (timerValue !== '0') timerContainer.classList.add('active');

window.playExpanded = (episodioObj) => {
  if (!episodioObj) return;
  let mapped = episodioObj;
  let isFromRec = false;
  let recIndex = -1;
  if (episodioObj.type && !episodioObj.mediaType) {
    mapped = mapEpisodeToMedia(episodioObj);
    recIndex = cachedRecomendados.findIndex(r => r.mediaUrl === episodioObj.mediaUrl);
    if (recIndex >= 0) isFromRec = true;
  }
  window.playEpisodeExpanded(
    mapped.mediaUrl || '',
    mapped.mediaType || 'audio',
    mapped.coverUrlContainer || '',
    mapped.coverUrlInfo || '',
    mapped.title || '',
    mapped.detailUrl || '',
    mapped.author || 'Roberto',
    mapped.next || [],
    mapped.text || '',
    mapped.allowDownload ?? true
  );
};

    localStorage.setItem('playlist', JSON.stringify(playlist));
    if (typeof updatePlaylist === 'function') updatePlaylist();
    if (typeof updateAddButton === 'function') updateAddButton();
    return true;
  }

};

const updateMediaSession = () => {
  if (!('mediaSession' in navigator)) {
    console.log('[MediaSession] No soportada en este navegador');
    return;
  }
  if (!currentMedia || !mediaElement) {
    console.log('[MediaSession] Esperando currentMedia o mediaElement...');
    return;
  }
  console.log('[MediaSession] Actualizando con:', {
    title: currentMedia.title,
    artist: currentMedia.author,
    cover: currentMedia.coverUrlContainer
  });
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: currentMedia.title || 'Episodio sin título',
      artist: currentMedia.author || 'Roberto',
      album: 'By Balta',
      artwork: [
        { src: currentMedia.coverUrlContainer || 'https://via.placeholder.com/512?text=Cover', sizes: '512x512', type: 'image/png' },
        { src: currentMedia.coverUrlContainer || 'https://via.placeholder.com/256?text=Cover', sizes: '256x256', type: 'image/png' },
        { src: currentMedia.coverUrlContainer || 'https://via.placeholder.com/192?text=Cover', sizes: '192x192', type: 'image/png' }
      ]
    });
    console.log('[MediaSession] Metadata OK');
    navigator.mediaSession.setActionHandler('play', () => { togglePlayPause(true); });
    navigator.mediaSession.setActionHandler('pause', () => { togglePlayPause(); });
    navigator.mediaSession.setActionHandler('previoustrack', previous);
    navigator.mediaSession.setActionHandler('nexttrack', next);
    navigator.mediaSession.setActionHandler('seekbackward', () => rewind(15));
    navigator.mediaSession.setActionHandler('seekforward', () => forward(15));
    if (!isNaN(mediaElement.duration)) {
      navigator.mediaSession.setPositionState({
        duration: mediaElement.duration,
        playbackRate: mediaElement.playbackRate || 1,
        position: mediaElement.currentTime || 0
      });
    }
  } catch (err) {
    console.error('[MediaSession] Error:', err.message);
  }
};
mediaElement.addEventListener('play', updateMediaSession);
mediaElement.addEventListener('pause', updateMediaSession);
mediaElement.addEventListener('loadedmetadata', updateMediaSession);
mediaElement.addEventListener('timeupdate', () => {
  if ('mediaSession' in navigator && !isNaN(mediaElement.duration)) {
    navigator.mediaSession.setPositionState({
      duration: mediaElement.duration,
      playbackRate: mediaElement.playbackRate || 1,
      position: mediaElement.currentTime || 0
    });
  }
});
window.addEventListener('beforeunload', () => {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = null;
  }
});
